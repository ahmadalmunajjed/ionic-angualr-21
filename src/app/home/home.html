<ion-header translucent="true">
  <ion-toolbar>
    <ion-title>Ionic Components</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Components</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>
    @for (comp of components; track comp.id) {
      <ion-item [routerLink]="['/demo', comp.id]" detail="true">
        <ion-icon [name]="comp.icon" slot="start" aria-hidden="true" />
        <ion-label>
          <h2>{{ comp.name }}</h2>
          <p>{{ comp.description }}</p>
        </ion-label>
      </ion-item>
    }
  </ion-list>
</ion-content>
